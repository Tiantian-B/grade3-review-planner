<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三年级期末复习</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f0ed; --card:#fff; --text:#2d2b28; --text2:#8b8680; --border:#e5e0d9;
  --m-blue:#5b8cb8; --m-blue-bg:#eaf2f9; --m-blue-card:#f6f9fc;
  --c-pink:#b8708c; --c-pink-bg:#faf0f5; --c-pink-card:#fdf8fa;
  --e-green:#6a9e7a; --e-green-bg:#edf5f0; --e-green-card:#f6faf7;
  --amber:#c4a04a; --amber-bg:#fdf7ed;
  --purple:#8b7eb8; --purple-bg:#f3f1f9; --purple-card:#f9f7fc;
  --red:#c47b7b; --red-bg:#faf1f1;
  --today-glow:rgba(91,140,184,.12);
}
body{font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:80px}

/* ===== HEADER ===== */
header{background:rgba(255,255,255,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:10}
header h1{font-size:1rem;text-align:center;font-weight:700}
.header-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:8px;flex-wrap:wrap}
.progress-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:var(--m-blue);transition:width .4s ease;border-radius:2px}
.pill{font-size:.68rem;padding:2px 9px;border-radius:10px;font-weight:600}
.pill-done{background:#d4e5d0;color:#4a7c4f}
.pill-warn{background:var(--amber-bg);color:#8b6914}
.pill-skip{background:#e8e5e0;color:var(--text2)}
.header-act{font-size:.68rem;padding:4px 12px;border-radius:14px;border:1px solid var(--border);cursor:pointer;background:var(--card);color:var(--text2);transition:all .15s;font-family:inherit;white-space:nowrap}
.header-act.sync{background:var(--purple-bg);border-color:#d5cee8;color:var(--purple)}
.header-act.danger{background:var(--red-bg);border-color:#e8d0d0;color:var(--red)}

/* Cloud panel */
.cloud-panel{display:none;background:var(--purple-bg);border:1px solid #e0daf0;border-radius:14px;padding:12px;margin:8px auto 0;max-width:520px;font-size:.74rem}
.cloud-panel input{flex:1;min-width:100px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:.72rem;font-family:inherit;background:var(--card)}
.cloud-panel .crow{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px}
.cloud-panel .hint{font-size:.64rem;color:var(--text2);margin-top:4px}
.cloud-panel .hint a{color:var(--purple)}

/* ===== TABS ===== */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:12px 16px 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 15px;border-radius:18px;background:var(--card);font-size:.76rem;cursor:pointer;white-space:nowrap;transition:all .2s;color:var(--text2);font-weight:500}
.tab:hover{color:var(--text)}
.tab.active{background:var(--text);color:#fff}

/* ===== CONTENT AREA ===== */
.container{max-width:720px;margin:0 auto;padding:0 14px 40px}

/* ===== DAY SECTION ===== */
.day-section{margin-bottom:16px}
.day-section .day-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 4px 6px}
.day-bar h3{font-size:.9rem;font-weight:700}
.day-bar .day-meta{display:flex;align-items:center;gap:6px;font-size:.7rem;color:var(--text2)}
.day-badge{font-size:.64rem;padding:3px 9px;border-radius:8px;font-weight:700}
.day-badge.review{background:var(--amber-bg);color:var(--amber)}
.day-badge.test{background:var(--m-blue-bg);color:var(--m-blue)}
.day-bar.today-bar{background:var(--m-blue-bg);margin:-4px;padding:8px;border-radius:10px;margin-bottom:6px}
.day-stats{font-size:.68rem;color:var(--text2);padding:0 4px 6px}

/* ===== TASK CARD ===== */
.task-card{border-radius:12px;padding:12px 14px;margin-bottom:6px;display:flex;flex-wrap:wrap;align-items:flex-start;gap:8px;transition:box-shadow .15s}
.task-card.math-card{background:var(--m-blue-card);border-left:4px solid var(--m-blue)}
.task-card.chinese-card{background:var(--c-pink-card);border-left:4px solid var(--c-pink)}
.task-card.english-card{background:var(--e-green-card);border-left:4px solid var(--e-green)}
.task-card.auto-card{background:var(--purple-card);border-left:4px solid var(--purple)}

.task-card .card-top{display:flex;align-items:center;gap:6px;width:100%}
.task-card .card-subj{font-size:.64rem;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap}
.math-subj{background:#d4e2f0;color:var(--m-blue)}
.chinese-subj{background:#f0dce5;color:var(--c-pink)}
.english-subj{background:#d4e8d8;color:var(--e-green)}
.auto-tag{font-size:.6rem;background:var(--purple);color:#fff;padding:2px 7px;border-radius:4px;font-weight:700;white-space:nowrap}

.task-card .card-time{font-size:.64rem;color:var(--text2);white-space:nowrap}
.task-card .card-core{font-size:.58rem;color:var(--amber);font-weight:600;white-space:nowrap}
.task-card .card-source{font-size:.58rem;color:var(--purple);font-weight:500;white-space:nowrap}

.task-card .card-body{font-size:.8rem;line-height:1.5;flex:1 1 100%;min-width:100%}

.task-card .card-actions{display:flex;gap:5px;width:100%}
.cbtn{flex:1;font-size:.66rem;padding:5px 0;border-radius:10px;border:1px solid var(--border);cursor:pointer;background:var(--card);color:var(--text2);transition:all .12s;font-family:inherit;font-weight:500;text-align:center}
.cbtn.on-done{background:#7a9e7e;color:#fff;border-color:#7a9e7e}
.cbtn.on-warn{background:var(--amber);color:#fff;border-color:var(--amber)}
.cbtn.on-skip{background:#bfbab2;color:#fff;border-color:#bfbab2}
.cbtn:hover{opacity:.85}

.task-card .card-note{width:100%;margin-top:2px;font-size:.68rem;padding:5px 10px;border:1px solid var(--border);border-radius:8px;display:none;font-family:inherit;background:var(--card);color:var(--text)}
.task-card .card-note:focus{outline:none;border-color:var(--m-blue)}

/* ===== ALERT / LEGEND ===== */
.alert{background:var(--amber-bg);border:1px solid #f0e4c8;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:.76rem;display:none;color:#8b6914}
.alert.show{display:block}
.alert strong{color:#6b5010}
.legend{font-size:.68rem;color:var(--text2);padding:0 0 10px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}

/* ===== ERROR / ASSESS ===== */
.err-section{margin-bottom:18px}
.err-section h4{font-size:.8rem;margin-bottom:8px;padding:5px 10px;border-radius:6px;display:inline-block;font-weight:600}
.err-section h4.mh{background:var(--m-blue-bg);color:var(--m-blue)}
.err-section h4.ch{background:var(--c-pink-bg);color:var(--c-pink)}
.err-section h4.eh{background:var(--e-green-bg);color:var(--e-green)}
.err-table{width:100%;font-size:.74rem;border-collapse:collapse;background:var(--card);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.err-table th,.err-table td{padding:6px 8px;border-bottom:1px solid var(--border);text-align:left}
.err-table th{background:#faf9f7;font-weight:600;font-size:.66rem;color:var(--text2)}
.err-table tr:last-child td{border-bottom:none}
.err-table input{width:100%;border:none;font-size:.74rem;padding:2px;background:transparent;font-family:inherit;color:var(--text)}
.err-table input:focus{outline:none}
.err-row.resolved td{opacity:.3;text-decoration:line-through}

.assess-card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.assess-card h4{font-size:.82rem;margin-bottom:8px;font-weight:600}
.assess-card label{display:block;font-size:.7rem;margin-bottom:2px;color:var(--text2);margin-top:8px}
.assess-card input,.assess-card textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:.78rem;margin-bottom:4px;font-family:inherit;background:var(--bg);color:var(--text)}
.assess-card input:focus,.assess-card textarea:focus{outline:none;border-color:var(--m-blue)}
.assess-card textarea{min-height:50px;resize:vertical}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:8px 20px;border-radius:20px;font-size:.78rem;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.toast.show{opacity:1}

/* ===== RESPONSIVE ===== */
@media (max-width:640px){
  .container{padding:0 8px}
  body{padding-bottom:60px}
  header{padding:10px 12px}
  header h1{font-size:.88rem}
  .tabs{padding:8px 8px 4px;gap:4px}
  .tab{padding:5px 10px;font-size:.7rem}
  .day-section .day-bar{padding:6px 2px 4px}
  .day-bar h3{font-size:.82rem}
  .task-card{padding:10px 12px;border-radius:10px}
  .task-card .card-body{font-size:.78rem}
  .cbtn{font-size:.7rem;padding:6px 0;min-height:36px;border-radius:10px}
  .card-note{margin-top:4px!important}
}
@media (max-width:400px){
  header h1{font-size:.82rem}
  .tab{padding:4px 8px;font-size:.66rem}
  .task-card{padding:8px 10px}
  .task-card .card-body{font-size:.74rem}
  .cbtn{font-size:.66rem}
}

@media print{
  header,.tabs,.toast,.alert,.day-bar.today-bar{display:none}
  .task-card{break-inside:avoid;box-shadow:none}
}
</style>
</head>
<body>

  <h1>📚 三年级期末复习</h1>
  <div class="header-row">
    <span style="font-size:.82rem;font-weight:700" id="totalPct">0%</span>

    <div class="hint">注册 <a href="https://jsonbin.io" target="_blank">jsonbin.io</a> → 创建 Bin → 复制 Key 和 ID 填入</div>

</header>

<div class="tabs" id="tabBar"></div>
<div class="container" id="content"></div>
<div class="toast" id="toast"></div>

  '面积':[2,5], '年月日':[2,5], '小数':[2,5], '分数':[2,5], '单位':[2,5], '方向':[2,5], '统计':[2,5],
  '句型':[1,4], '阅读':[3], '作文':[4],
  '复习':[], '检测':[], '模拟':[], '准备':[],
};
const ROUND_LABEL = { 1:'回滚①', 2:'回滚②', 3:'回滚③' };

// ===== STATE =====
const SK = 'review_v6';
let S = loadState();
function defaultState() {
  const st = { subs:{}, autoSubs:{}, errors:{math:[],chinese:[],english:[]}, assess:{} };
  W.forEach((w,wi)=>{ w.days.forEach((d,di)=>{ d.subs.forEach((_,si)=>{
    st.subs[`${wi}-${di}-${si}`] = { status:'none', note:'' };
  });});});
  return st;
}
function loadState() {
  try {
    const r = localStorage.getItem(SK);
    if (r) {
      const p = JSON.parse(r);
      const def = defaultState();
      for (const k of Object.keys(def.subs)) { if (!p.subs[k]) p.subs[k] = def.subs[k]; }
      if (!p.autoSubs) p.autoSubs = {};
      if (!p.errors) p.errors = def.errors;
      if (!p.assess) p.assess = def.assess;
      return p;
    }
  } catch(e) {}
  return defaultState();
}
function save() { localStorage.setItem(SK, JSON.stringify(S)); updateLastSave(); }

function gs(wi,di,si) { return S.subs[`${wi}-${di}-${si}`]?.status || 'none'; }
function gn(wi,di,si) { return S.subs[`${wi}-${di}-${si}`]?.note || ''; }
function autoStatus(id) { return S.autoSubs[id]?.status || 'none'; }
function autoNote(id) { return S.autoSubs[id]?.note || ''; }

function setStatus(wi,di,si,st) {
  const cur = gs(wi,di,si);
  S.subs[`${wi}-${di}-${si}`].status = cur === st ? 'none' : st;
  save(); refresh();
  if (S.subs[`${wi}-${di}-${si}`].status === 'warn') {
    setTimeout(()=>{ const el = document.getElementById(`nt-${wi}-${di}-${si}`); if(el){el.style.display='block';el.focus();} }, 50);
  }
}
function upNote(wi,di,si,v) { S.subs[`${wi}-${di}-${si}`].note = v; save(); }

function setAutoStatus(id, st) {
  if (!S.autoSubs[id]) S.autoSubs[id] = { status:'none', note:'' };
  const cur = S.autoSubs[id].status;
  S.autoSubs[id].status = cur === st ? 'none' : st;
  save(); refresh();
  if (S.autoSubs[id].status === 'warn') {
    setTimeout(()=>{ const el = document.getElementById(`ant-${id.replace(/[^a-zA-Z0-9]/g,'_')}`); if(el){el.style.display='block';el.focus();} }, 50);
  }
}
function upAutoNote(id, v) {
  if (!S.autoSubs[id]) S.autoSubs[id] = { status:'none', note:'' };
  S.autoSubs[id].note = v; save();
}

function flattenDays() {
  const flat = [];
  W.forEach((w, wi) => { w.days.forEach((d, di) => { flat.push({ wi, di, date: d.date, badge: d.badge }); }); });
  return flat;
}
function findDayAtOffset(fromWi, fromDi, offset) {
  const flat = flattenDays();
  const fromIdx = flat.findIndex(d => d.wi === fromWi && d.di === fromDi);
  if (fromIdx < 0) return null;
  const targetIdx = fromIdx + offset;
  if (targetIdx >= 0 && targetIdx < flat.length) return flat[targetIdx];
  return null;
}

function computeAutoTasks() {
  const autoTasks = {};
  W.forEach((w, wi) => {
    w.days.forEach((d, di) => {
      d.subs.forEach((sub, si) => {
        if (gs(wi, di, si) !== 'warn') return;
        const schedules = SPACED_SCHEDULE[sub.tags] || [];
        schedules.forEach((offset, roundIdx) => {
          const round = roundIdx + 1;
          let target = findDayAtOffset(wi, di, offset);
          if (!target) return;
          let tw = target.wi, td = target.di;
          if (W[tw].days[td].badge === 'test') {
            const next = findDayAtOffset(tw, td, 1);
            if (next) { tw = next.wi; td = next.di; }
          }
          const autoId = `${wi}-${di}-${si}-r${round}`;
          const key = `${tw}-${td}`;
          if (!autoTasks[key]) autoTasks[key] = [];
          if (!autoTasks[key].find(a => a.id === autoId)) {
            autoTasks[key].push({ id: autoId, sourceSubject: sub.s, sourceContent: sub.c,
              sourceTags: sub.tags, sourceWi: wi, sourceDi: di, sourceSi: si, round, isCore: sub.t === 'core' });
          }
        });
      });
    });
  });
  return autoTasks;
}

function weekProgress(wi) {
  let t=0, d=0, w=0, s=0;
  W[wi].days.forEach((day,di)=>{ day.subs.forEach((_,si)=>{
    t++; const st=gs(wi,di,si);
    if(st==='done')d++; if(st==='warn')w++; if(st==='skip')s++;
  });});
  const autoTasks = computeAutoTasks();
  Object.entries(autoTasks).forEach(([key, tasks])=>{
    const [tw] = key.split('-').map(Number);
    if(tw===wi) tasks.forEach(at=>{ t++; if(autoStatus(at.id)==='done')d++; });
  });
  return {t,d,w,s,pct:t?Math.round(d/t*100):0};
}
function totalProgress() {
  let t=0,d=0,w=0,s=0;
  W.forEach((_,wi)=>{ const p=weekProgress(wi); t+=p.t; d+=p.d; w+=p.w; s+=p.s; });
  return {t,d,w,s,pct:t?Math.round(d/t*100):0};
}

function computeSummary() {
  const subWarn = { math:0, chinese:0, english:0 };
  const autoTasks = computeAutoTasks(); let totalAuto = 0;
  Object.values(autoTasks).forEach(tasks => { totalAuto += tasks.length; });
  W.forEach((w,wi)=>{ w.days.forEach((d,di)=>{ d.subs.forEach((sub,si)=>{
    if(gs(wi,di,si)==='warn') subWarn[sub.s] = (subWarn[sub.s]||0)+1;
  });});});
  const summary = [];
  if(subWarn.math>=4) summary.push({subj:'数学', msg:`${subWarn.math}项需回滚，建议放慢节奏`});
  if(subWarn.chinese>=4) summary.push({subj:'语文', msg:`${subWarn.chinese}项需回滚，建议每日听写量减半`});
  if(subWarn.english>=3) summary.push({subj:'英语', msg:`${subWarn.english}项需回滚，建议增加跟读时间`});
  if(totalAuto>0) summary.push({subj:'回滚', msg:`${totalAuto} 项任务已按记忆曲线自动排入后续日程`});
  return summary;
}

// ===== RENDER =====
let curTab = 'week-0';

function refresh() {
  const p = totalProgress();
  document.getElementById('totalPct').textContent = p.pct+'%';
  document.getElementById('progBar').style.width = p.pct+'%';
  document.getElementById('cntDone').textContent = p.d; document.getElementById('pillDone').style.display = p.d>0?'':'none';
  document.getElementById('cntWarn').textContent = p.w; document.getElementById('pillWarn').style.display = p.w>0?'':'none';
  document.getElementById('cntSkip').textContent = p.s; document.getElementById('pillSkip').style.display = p.s>0?'':'none';
  renderTabs(); renderPanel(curTab);
}

function renderTabs() {
  let h = '';
  W.forEach((w,i)=>{
    const p = weekProgress(i);
    h += `<div class="tab${curTab==='week-'+i?' active':''}" onclick="switchTab('week-${i}')">第${i+1}周 <span style="font-size:.68rem;opacity:.65">${p.pct}%</span></div>`;
  });
  const errTotal = (S.errors.math||[]).filter(e=>!e.resolved).length + (S.errors.chinese||[]).filter(e=>!e.resolved).length + (S.errors.english||[]).filter(e=>!e.resolved).length;
  h += `<div class="tab${curTab==='errors'?' active':''}" onclick="switchTab('errors')">错题${errTotal>0?' · '+errTotal:''}</div>`;
  h += `<div class="tab${curTab==='assess'?' active':''}" onclick="switchTab('assess')">评估</div>`;
  document.getElementById('tabBar').innerHTML = h;
}

function switchTab(t) { curTab=t; refresh(); }

function renderPanel(tab) {
  const c = document.getElementById('content');
  if(tab==='errors'){ c.innerHTML = renderErrors(); return; }
  if(tab==='assess'){ c.innerHTML = renderAssess(); return; }
  c.innerHTML = renderWeek(parseInt(tab.split('-')[1]));
}

function renderWeek(wi) {
  const autoTasks = computeAutoTasks();
  const summary = computeSummary();
  const p = weekProgress(wi);
  let h = '';

  // Legend
  h += `<div class="legend"><span class="card-subj math-subj" style="font-size:.64rem">数学</span><span class="card-subj chinese-subj" style="font-size:.64rem">语文</span><span class="card-subj english-subj" style="font-size:.64rem">英语</span><span style="margin-left:4px">按学科分色</span><span style="margin-left:8px;width:10px;height:10px;display:inline-block;background:var(--purple-card);border-left:3px solid var(--purple);border-radius:2px"></span><span style="color:var(--purple)">回滚</span></div>`;

  // Alert
  if(summary.length>0){
    h += '<div class="alert show"><strong>智能提醒</strong>';
    summary.forEach(s=>{ h += `<div class="alert-item">· ${s.subj}：${s.msg}</div>`; });
    h += '</div>';
  }

  // Week stats
  const weekAutoTasks = Object.entries(autoTasks).filter(([key])=>{ const [tw]=key.split('-').map(Number); return tw===wi; });
  const autoCount = weekAutoTasks.reduce((sum,[,tasks])=>sum+tasks.length,0);
  h += `<div style="font-size:.74rem;color:var(--text2);margin-bottom:12px">已完成 ${p.d}/${p.t-p.s} · 回滚 ${p.w} · 跳过 ${p.s}${autoCount>0?' · 自动回滚 '+autoCount+'项':''}</div>`;

  W[wi].days.forEach((day, di) => {
    const isToday = isCurrentDay(wi, di);
    const dayTime = day.subs.reduce((sum, sub) => sum + (sub.time||0), 0);
    const key = `${wi}-${di}`;
    const dayAutoTasks = autoTasks[key] || [];

    h += `<div class="day-section">`;
    h += `<div class="day-bar${isToday?' today-bar':''}">`;
    h += `<h3>${day.date}${isToday?' · 今天':''}</h3>`;
    h += `<div class="day-meta">`;
    if(day.badge) h += `<span class="day-badge ${day.badge==='review'?'review':'test'}">${day.badge==='review'?'复习日':'检测日'}</span>`;
    h += `<span>${dayTime}分钟</span></div></div>`;

    let dt=0, dd=0;
    day.subs.forEach((_,si)=>{ dt++; if(gs(wi,di,si)==='done') dd++; });
    if(dt>0) h += `<div class="day-stats">${dd}/${dt} 完成</div>`;

    // Original task cards
    day.subs.forEach((sub, si) => { h += renderTaskCard(wi, di, si, sub, false); });

    // Auto task cards
    dayAutoTasks.forEach(at => { h += renderAutoCard(at); });

    h += `</div>`;
  });

  h += `<div style="margin-top:16px"><button class="header-act danger" onclick="if(confirm('重置本周所有状态？')){resetWeek(${wi});}">重置本周</button></div>`;
  return h;
}

function renderTaskCard(wi, di, si, sub, isAuto) {
  const st = gs(wi,di,si), note = gn(wi,di,si);
  const cardCls = sub.s==='math'?'math-card':sub.s==='chinese'?'chinese-card':'english-card';
  const subjCls = sub.s==='math'?'math-subj':sub.s==='chinese'?'chinese-subj':'english-subj';

  let h = `<div class="task-card ${cardCls}">`;
  // Top line: subject, time, core badge
  h += `<div class="card-top">`;
  h += `<span class="card-subj ${subjCls}">${sub.d}</span>`;
  h += `<span class="card-time">${sub.time}分钟</span>`;
  if(sub.t==='core') h += `<span class="card-core">● 重点</span>`;
  h += `</div>`;
  // Body
  h += `<div class="card-body">${sub.c}</div>`;
  // Actions
  h += `<div class="card-actions">`;
  h += `<button class="cbtn${st==='done'?' on-done':''}" onclick="setStatus(${wi},${di},${si},'done')">✓ 完成</button>`;
  h += `<button class="cbtn${st==='warn'?' on-warn':''}" onclick="setStatus(${wi},${di},${si},'warn')">⟳ 回滚</button>`;
  h += `<button class="cbtn${st==='skip'?' on-skip':''}" onclick="setStatus(${wi},${di},${si},'skip')">— 跳过</button>`;
  h += `</div>`;
  // Note
  h += `<input class="card-note" id="nt-${wi}-${di}-${si}" placeholder="备注（错在哪/为什么跳过）…" value="${esc(note)}" onchange="upNote(${wi},${di},${si},this.value)" style="display:${note||st==='warn'?'block':'none'}">`;
  h += `</div>`;
  return h;
}

function renderAutoCard(at) {
  const st = autoStatus(at.id), note = autoNote(at.id);
  const cardCls = at.sourceSubject==='math'?'math-card':at.sourceSubject==='chinese'?'chinese-card':'english-card';
  const subjCls = at.sourceSubject==='math'?'math-subj':at.sourceSubject==='chinese'?'chinese-subj':'english-subj';
  const label = at.sourceSubject==='math'?'数学':at.sourceSubject==='chinese'?'语文':'英语';
  const noteId = `ant-${at.id.replace(/[^a-zA-Z0-9]/g,'_')}`;

  let h = `<div class="task-card auto-card">`;
  h += `<div class="card-top">`;
  h += `<span class="auto-tag">${ROUND_LABEL[at.round]||'回滚'}</span>`;
  h += `<span class="card-subj ${subjCls}">${label}</span>`;
  h += `<span class="card-time">~5分钟</span>`;
  h += `<span class="card-source">源自${W[at.sourceWi].days[at.sourceDi].date}</span>`;
  h += `</div>`;
  h += `<div class="card-body">${at.sourceContent}</div>`;
  h += `<div class="card-actions">`;
  h += `<button class="cbtn${st==='done'?' on-done':''}" onclick="setAutoStatus('${at.id}','done')">✓ 完成</button>`;
  h += `<button class="cbtn${st==='warn'?' on-warn':''}" onclick="setAutoStatus('${at.id}','warn')">⟳ 回滚</button>`;
  h += `<button class="cbtn${st==='skip'?' on-skip':''}" onclick="setAutoStatus('${at.id}','skip')">— 跳过</button>`;
  h += `</div>`;
  h += `<input class="card-note" id="${noteId}" placeholder="回滚结果…" value="${esc(note)}" onchange="upAutoNote('${at.id}',this.value)" style="display:${note||st==='warn'?'block':'none'}">`;
  h += `</div>`;
  return h;
}

function isCurrentDay(wi, di) {
  const dayMap = {
    '0-0':'2026-06-02','0-1':'2026-06-03','0-2':'2026-06-04','0-3':'2026-06-05','0-4':'2026-06-06','0-5':'2026-06-07',
    '1-0':'2026-06-08','1-1':'2026-06-09','1-2':'2026-06-10','1-3':'2026-06-11','1-4':'2026-06-12','1-5':'2026-06-13',
    '2-0':'2026-06-15','2-1':'2026-06-16','2-2':'2026-06-17','2-3':'2026-06-18','2-4':'2026-06-19','2-5':'2026-06-20',
    '3-0':'2026-06-22','3-1':'2026-06-23','3-2':'2026-06-24','3-3':'2026-06-25','3-4':'2026-06-26','3-5':'2026-06-27',
  };
  const key = `${wi}-${di}`;
  if(dayMap[key]){
    const d = new Date(dayMap[key]+'T00:00:00');
    const today = new Date((new Date()).getFullYear(),(new Date()).getMonth(),(new Date()).getDate());
    return d.getTime()===today.getTime();
  }
  return false;
}

// ===== ERRORS =====
function renderErrors(){
  let h = '<p style="font-size:.76rem;color:var(--text2);margin-bottom:14px">标记"回滚"的子任务会自动提示录入，已解决的会划线。</p>';
  const warnItems = [];
  W.forEach((w,wi)=>{ w.days.forEach((d,di)=>{ d.subs.forEach((sub,si)=>{
    if(gs(wi,di,si)==='warn') warnItems.push({sub,wi,di,si});
  });});});
  if(warnItems.length>0){
    h += '<div class="alert show" style="margin-bottom:14px"><strong>待录入错题</strong>';
    warnItems.forEach(item=>{
      const note = gn(item.wi,item.di,item.si);
      h += `<div class="alert-item">· ${item.sub.d}：${item.sub.c.substring(0,40)}… ${note?'【'+note+'】':''}</div>`;
    });
    h += '</div>';
  }
  const subs=[{k:'math',l:'数学',h:'mh'},{k:'chinese',l:'语文',h:'ch'},{k:'english',l:'英语',h:'eh'}];
  subs.forEach(sb=>{
    const errs = S.errors[sb.k]||[];
    const un=errs.filter(e=>!e.resolved), re=errs.filter(e=>e.resolved);
    h += `<div class="err-section"><h4 class="${sb.h}">${sb.l} · 未解决${un.length} · 已解决${re.length}</h4>`;
    h += '<table class="err-table"><tr><th>日期</th><th>知识点</th><th>错题描述</th><th>类型</th><th></th></tr>';
    [...un,...re].forEach(e=>{
      const idx=errs.indexOf(e);
      h += `<tr class="err-row${e.resolved?' resolved':''}">`;
      h += `<td><input value="${esc(e.date||'')}" onchange="upErr('${sb.k}',${idx},'date',this.value)" placeholder="6/2"></td>`;
      h += `<td><input value="${esc(e.content||'')}" onchange="upErr('${sb.k}',${idx},'content',this.value)" placeholder="面积换算"></td>`;
      h += `<td><input value="${esc(e.desc||'')}" onchange="upErr('${sb.k}',${idx},'desc',this.value)" placeholder="怎么错的"></td>`;
      h += `<td><input value="${esc(e.errorType||'')}" onchange="upErr('${sb.k}',${idx},'errorType',this.value)" placeholder="概念/粗心"></td>`;
      h += `<td style="white-space:nowrap">`;
      h += `<button class="header-act sync" style="font-size:.6rem;padding:2px 6px" onclick="toggleErr('${sb.k}',${idx})">${e.resolved?'撤销':'解决'}</button>`;
      h += `<button class="header-act danger" style="font-size:.6rem;padding:2px 6px" onclick="delErr('${sb.k}',${idx})">删</button></td></tr>`;
    });
    h += '</table>';
    h += `<button class="header-act sync" style="margin-top:6px" onclick="addErr('${sb.k}')">+ 添加</button>`;
    h += '</div>';
  });
  return h;
}
function addErr(k){S.errors[k].push({date:'',content:'',desc:'',errorType:'',resolved:false});save();refresh();}
function toggleErr(k,i){S.errors[k][i].resolved=!S.errors[k][i].resolved;save();refresh();}
function delErr(k,i){S.errors[k].splice(i,1);save();refresh();}
function upErr(k,i,f,v){if(S.errors[k][i]){S.errors[k][i][f]=v;save();}}

// ===== ASSESSMENT =====
function renderAssess(){
  let h = '<p style="font-size:.76rem;color:var(--text2);margin-bottom:14px">每周六花5分钟填写，系统结合统计数据帮你决策下周方向。</p>';
  W.forEach((w,wi)=>{
    const p=weekProgress(wi);
    const a=S.assess[wi]||{};
    h += `<div class="assess-card"><h4>第${wi+1}周评估 · 完成率${p.pct}% · 回滚${p.w} · 跳过${p.s}</h4>`;
    h += `<label>完成率（%）</label><input value="${esc(a.completion||'')}" onchange="upAssess(${wi},'completion',this.value)" placeholder="如 85">`;
    h += `<label>学得最顺的</label><input value="${esc(a.strength||'')}" onchange="upAssess(${wi},'strength',this.value)" placeholder="如 英语单词">`;
    h += `<label>最需要加强的</label><input value="${esc(a.weakness||'')}" onchange="upAssess(${wi},'weakness',this.value)" placeholder="如 面积换算">`;
    h += `<label>需继续补的内容</label><textarea onchange="upAssess(${wi},'rollback',this.value)">${esc(a.rollback||'')}</textarea>`;
    h += `<label>下周怎么调整</label><textarea onchange="upAssess(${wi},'adjust',this.value)">${esc(a.adjust||'')}</textarea>`;
    h += '</div>';
  });
  h += '<div style="margin-top:12px"><button class="header-act danger" onclick="if(confirm(\'清除所有评估？\')){S.assess={};save();refresh();}">清除评估</button></div>';
  return h;
}
function upAssess(wi,f,v){if(!S.assess[wi])S.assess[wi]={};S.assess[wi][f]=v;save();}

// ===== CLOUD SYNC =====
const CL_CONFIG='cloud_config';
function getCloudConfig(){try{return JSON.parse(localStorage.getItem(CL_CONFIG))||{};}catch(e){return{};}}
function setCloudConfig(c){localStorage.setItem(CL_CONFIG,JSON.stringify(c));}
function toggleCloudPanel(){
  const p=document.getElementById('cloudPanel');
  p.style.display=p.style.display==='none'?'block':'none';
  const cfg=getCloudConfig();
  if(cfg.key)document.getElementById('jsonbinKey').value=cfg.key;
  if(cfg.id)document.getElementById('jsonbinId').value=cfg.id;
}
function saveCloudConfig(){
  const key=document.getElementById('jsonbinKey').value.trim();
  const id=document.getElementById('jsonbinId').value.trim();
  if(!key||!id){toast('请填写 Key 和 ID');return;}
  setCloudConfig({key,id});toast('配置已保存');
}
function buildPayload(){
  return {version:5,updatedAt:new Date().toISOString(),subs:S.subs,autoSubs:S.autoSubs,errors:S.errors,assess:S.assess};
}
async function syncToCloud(){
  const cfg=getCloudConfig();
  if(!cfg.key||!cfg.id){toggleCloudPanel();toast('请先配置云端');return;}
  const st=document.getElementById('cloudStatus');st.textContent='上传中…';
  try{
    const resp=await fetch(`https://api.jsonbin.io/v3/b/${cfg.id}`,{
      method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':cfg.key,'X-Bin-Versioning':'false'},
      body:JSON.stringify(buildPayload()),
    });
    if(resp.ok){st.textContent='✓ 已同步 '+new Date().toLocaleTimeString();toast('云端同步成功');}
    else{const err=await resp.json().catch(()=>({}));st.textContent='失败';toast('同步失败: '+(err.message||resp.status));}
  }catch(e){st.textContent='网络错误';toast('网络连接失败');}
}
async function syncFromCloud(){
  const cfg=getCloudConfig();
  if(!cfg.key||!cfg.id){toggleCloudPanel();toast('请先配置云端');return;}
  const st=document.getElementById('cloudStatus');st.textContent='加载中…';
  try{
    const resp=await fetch(`https://api.jsonbin.io/v3/b/${cfg.id}/latest`,{headers:{'X-Master-Key':cfg.key}});
    if(resp.ok){
      const result=await resp.json();const data=result.record;
      if(!data.subs){toast('数据格式无效');return;}
      for(const k of Object.keys(data.subs)){if(S.subs[k]!==undefined)S.subs[k]=data.subs[k];}
      if(data.autoSubs)S.autoSubs=data.autoSubs;
      if(data.errors)S.errors=data.errors;
      if(data.assess)S.assess=data.assess;
      save();refresh();st.textContent='✓ 已加载 '+new Date().toLocaleTimeString();toast('云端数据已加载');
    }else{st.textContent='失败';toast('加载失败');}
  }catch(e){st.textContent='网络错误';toast('网络连接失败');}
}

// ===== UTILS =====
function clearAll(){S=defaultState();save();refresh();toast('数据已清除');}
function updateLastSave(){
  const el=document.getElementById('lastSave');if(!el)return;
  const n=new Date();
  el.textContent=`保存 ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function resetWeek(wi){
  W[wi].days.forEach((d,di)=>{d.subs.forEach((_,si)=>{S.subs[`${wi}-${di}-${si}`]={status:'none',note:''};});});
  const autoTasks=computeAutoTasks();
  Object.entries(autoTasks).forEach(([key,tasks])=>{
    const[tw]=key.split('-').map(Number);
    if(tw===wi)tasks.forEach(at=>{delete S.autoSubs[at.id];});
  });
  save();refresh();toast(`第${wi+1}周已重置`);
}

// ===== INIT =====
refresh();
setTimeout(()=>{
  for(let wi=0;wi<W.length;wi++)for(let di=0;di<W[wi].days.length;di++)if(isCurrentDay(wi,di)){
    curTab='week-'+wi;refresh();
    setTimeout(()=>{const cards=document.querySelectorAll('.day-bar.today-bar');if(cards.length>0)cards[0].scrollIntoView({behavior:'smooth',block:'start'});},200);
    return;
  }
},100);
</script>
