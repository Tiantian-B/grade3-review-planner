<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三年级期末复习 · 动态执行工具</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#16a34a;--red:#dc2626;--yellow:#ca8a04;--blue:#2563eb;--purple:#7c3aed;--gray:#6b7280;--bg:#f8fafc;--card:#fff;--text:#1e293b;--text2:#64748b;--border:#e2e8f0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding-bottom:100px}
.container{max-width:800px;margin:0 auto;padding:12px}

header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:10}
header h1{font-size:1.1rem;text-align:center}
.header-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:6px;flex-wrap:wrap}
.pill{font-size:.72rem;padding:2px 10px;border-radius:10px;font-weight:600}
.pill-ok{background:#dcfce7;color:#166534}
.pill-warn{background:#fef3c7;color:#92400e}
.pill-skip{background:#fee2e2;color:#991b1b}
.progress-wrap{height:5px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);transition:width .4s;border-radius:3px}

.tabs{display:flex;gap:4px;overflow-x:auto;padding:10px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 12px;border:1px solid var(--border);border-radius:18px;background:var(--card);font-size:.8rem;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.tab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.tab .dot.red{background:var(--red)} .tab .dot.yellow{background:var(--yellow)}

.alert-banner{background:#fef3c7;border:1px solid #fcd34d;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:.82rem;display:none}
.alert-banner.show{display:block}
.alert-banner strong{color:#92400e}
.alert-item{padding:3px 0}

.day-card{background:var(--card);border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.day-card.today{border-left:3px solid var(--blue)}
.day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.day-header h3{font-size:.92rem}
.day-stats{font-size:.72rem;color:var(--text2);margin-bottom:4px}
.badge{font-size:.68rem;padding:2px 8px;border-radius:8px;font-weight:600}
.badge.review{background:#fef3c7;color:#92400e}
.badge.test{background:#dbeafe;color:#1e40af}
.day-time{font-size:.72rem;color:var(--text2)}

/* Regular subtask row */
.sub-row{display:flex;align-items:flex-start;gap:6px;padding:7px 0;border-bottom:1px solid #f8fafc;font-size:.82rem}
.sub-row:last-child{border-bottom:none}

/* Auto (review) task row */
.auto-row{background:#fdf4ff;border-radius:6px;padding:7px 6px;margin:2px 0;border-left:3px solid var(--purple)}
.auto-row .auto-badge{font-size:.62rem;background:var(--purple);color:#fff;padding:1px 6px;border-radius:4px;white-space:nowrap;font-weight:600}
.auto-row .review-round{font-size:.6rem;color:var(--purple);white-space:nowrap;font-weight:600}

/* Subject label */
.subj-tag{font-size:.68rem;font-weight:700;padding:2px 5px;border-radius:4px;white-space:nowrap;min-width:32px;text-align:center;flex-shrink:0}
.subj-math{background:#dbeafe;color:#1e40af}
.subj-chinese{background:#fce7f3;color:#9d174d}
.subj-english{background:#d1fae5;color:#065f46}

/* Time badge */
.time-badge{font-size:.65rem;color:var(--text2);background:#f1f5f9;padding:1px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0;min-width:36px;text-align:center}

.sub-content{flex:1;font-size:.8rem;min-width:0}
.sub-content.core{font-weight:600}
.core-dot{font-size:.6rem;background:#fef3c7;color:#92400e;padding:0 4px;border-radius:3px;white-space:nowrap}

/* Status buttons */
.status-btns{display:flex;gap:3px;flex-shrink:0}
.sbtn{font-size:.68rem;padding:3px 7px;border-radius:5px;border:1px solid var(--border);cursor:pointer;background:#fff;color:var(--text2);transition:all .12s;white-space:nowrap;font-family:inherit}
.sbtn:hover{opacity:.8}
.sbtn.on-done{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}
.sbtn.on-warn{background:var(--yellow);color:#fff;border-color:var(--yellow);font-weight:600}
.sbtn.on-skip{background:var(--gray);color:#fff;border-color:var(--gray);font-weight:600}

.sub-notes{width:100%;margin-top:3px;font-size:.72rem;padding:3px 6px;border:1px solid var(--border);border-radius:4px;display:none;font-family:inherit}

.btn{padding:7px 14px;border:none;border-radius:8px;font-size:.8rem;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-blue{background:var(--blue);color:#fff}
.btn-outline{background:#fff;color:var(--red);border:1px solid var(--red)}
.btn-sm{padding:3px 8px;font-size:.7rem;border-radius:5px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

/* Legend */
.legend{font-size:.72rem;color:var(--text2);padding:4px 0;margin-bottom:8px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.legend span{display:inline-flex;align-items:center;gap:3px}

/* Error */
.err-section{margin-bottom:18px}
.err-section h4{font-size:.85rem;margin-bottom:8px;padding:5px 10px;border-radius:6px;display:inline-block}
.err-section h4.mh{background:#dbeafe;color:#1e40af}
.err-section h4.ch{background:#fce7f3;color:#9d174d}
.err-section h4.eh{background:#d1fae5;color:#065f46}
.err-table{width:100%;font-size:.78rem;border-collapse:collapse}
.err-table th,.err-table td{padding:5px 6px;border:1px solid var(--border);text-align:left}
.err-table th{background:#f8fafc;font-weight:600;font-size:.7rem}
.err-table input{width:100%;border:none;font-size:.78rem;padding:2px;background:transparent}
.err-table input:focus{outline:none;background:#f0f9ff}
.err-row.resolved td{opacity:.35;text-decoration:line-through}

/* Assess */
.assess-card{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px;margin-bottom:10px}
.assess-card h4{font-size:.85rem;margin-bottom:8px}
.assess-card label{display:block;font-size:.75rem;margin-bottom:3px;color:var(--text2)}
.assess-card input,.assess-card textarea{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:.82rem;margin-bottom:8px;font-family:inherit}
.assess-card textarea{min-height:45px;resize:vertical}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:7px 18px;border-radius:16px;font-size:.8rem;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media print{
  header,.tabs,.actions,.toast,.alert-banner{display:none}
  .day-card{break-inside:avoid;box-shadow:none;border:1px solid var(--border)}
}
/* Responsive: tablet & phone */
@media (max-width:640px){
  .container{padding:8px}
  header h1{font-size:1rem}
  .header-row{gap:6px}
  .tab{padding:6px 10px;font-size:.75rem}
  /* Sub-row: allow wrapping */
  .sub-row{flex-wrap:wrap;gap:4px;padding:8px 0}
  .sub-content{flex:1 1 100%;min-width:100%;font-size:.8rem;order:10}
  .status-btns{order:11;margin-top:4px}
  .sbtn{font-size:.72rem;padding:5px 10px;min-height:36px} /* larger touch target */
  .btn{min-height:36px}
  .btn-sm{min-height:30px}
  .legend{font-size:.68rem;gap:6px}
  /* Notes input wider */
  .sub-notes{margin-left:4px!important;width:calc(100% - 8px)!important}
  /* Auto row */
  .auto-row{flex-wrap:wrap}
}
/* Phone only: even tighter */
@media (max-width:400px){
  .subj-tag{font-size:.62rem;padding:2px 3px}
  .time-badge{font-size:.6rem;min-width:28px}
  .sbtn{font-size:.68rem;padding:4px 7px}
  .status-btns{gap:2px}
  .sub-content{font-size:.76rem}
  header .btn-sm{font-size:.62rem;padding:3px 6px}
}
</style>
</head>

<header>
  <h1>三年级期末复习工具</h1>
  <div class="header-row">
    <span style="font-size:.78rem;color:var(--text2)">总进度</span>

    <span class="pill pill-warn" id="pillWarn" style="display:none">! 回滚<span id="cntWarn">0</span></span>
    <span class="pill pill-skip" id="pillSkip" style="display:none">— 跳过<span id="cntSkip">0</span></span>
  </div>
  <div style="display:flex;justify-content:center;align-items:center;gap:12px;margin-top:6px;flex-wrap:wrap;">
    <span style="font-size:.68rem;color:var(--text2);" id="lastSave"></span>
    <button class="btn btn-sm" style="background:#f0fdf4;color:var(--green);border:1px solid var(--green);font-size:.68rem;" onclick="exportData()">📥 导出备份</button>
    <button class="btn btn-sm" style="background:#fff;color:var(--text2);border:1px solid var(--border);font-size:.68rem;" onclick="document.getElementById('importFile').click()">📤 导入备份</button>
    <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
    <button class="btn btn-sm" id="cloudSyncBtn" style="background:#eff6ff;color:var(--blue);border:1px solid var(--blue);font-size:.68rem;" onclick="toggleCloudPanel()">☁️ 云端同步</button>
    <button class="btn btn-sm" style="background:#fff;color:var(--red);border:1px solid var(--red);font-size:.68rem;" onclick="if(confirm('确定清除所有数据？（建议先导出备份）')){clearAll();}">🗑 清除数据</button>
  </div>
  <div id="cloudPanel" style="display:none;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px;margin:6px auto 0;max-width:600px;font-size:.75rem;">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <input id="jsonbinKey" placeholder="JSONBin API Key" style="flex:1;min-width:140px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:.7rem;">
      <input id="jsonbinId" placeholder="Bin ID" style="flex:1;min-width:120px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:.7rem;">
      <button class="btn btn-sm btn-blue" onclick="saveCloudConfig()">保存配置</button>
    </div>
    <div style="margin-top:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-sm" style="background:var(--green);color:#fff;" onclick="syncToCloud()">📤 上传到云端</button>
      <button class="btn btn-sm" style="background:var(--blue);color:#fff;" onclick="syncFromCloud()">📥 从云端加载</button>
      <span id="cloudStatus" style="font-size:.68rem;color:var(--text2);"></span>
    </div>
    <div style="font-size:.65rem;color:var(--text2);margin-top:4px;">如何获取：<a href="https://jsonbin.io" target="_blank">jsonbin.io</a> 注册免费账号 → 创建 Bin → 复制 API Key 和 Bin ID</div>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="progBar" style="width:0%"></div></div>
</header>

<div class="tabs" id="tabBar"></div>

<div class="container" id="content"></div>
<div class="toast" id="toast"></div>

// Round labels for display
const ROUND_LABEL = { 1: '第1次回滚', 2: '第2次回滚', 3: '第3次回滚' };

// ===== STATE =====
const SK = 'review_v5';
let S = loadState();
function defaultState() {
  const st = { subs:{}, autoSubs:{}, errors:{math:[],chinese:[],english:[]}, assess:{} };
  W.forEach((w,wi)=>{ w.days.forEach((d,di)=>{ d.subs.forEach((_,si)=>{
    st.subs[`${wi}-${di}-${si}`] = { status:'none', note:'' };
  });});});
  return st;
}
function loadState() {
  try {
    const r = localStorage.getItem(SK);
    if (r) {
      const p = JSON.parse(r);
      const def = defaultState();
      for (const k of Object.keys(def.subs)) { if (!p.subs[k]) p.subs[k] = def.subs[k]; }
      if (!p.autoSubs) p.autoSubs = {};
      if (!p.errors) p.errors = def.errors;
      if (!p.assess) p.assess = def.assess;
      return p;
    }
  } catch(e) {}
  return defaultState();
}
function save() { localStorage.setItem(SK, JSON.stringify(S)); updateLastSave(); }

// ===== HELPERS =====
function gs(wi,di,si) { return S.subs[`${wi}-${di}-${si}`]?.status || 'none'; }
function gn(wi,di,si) { return S.subs[`${wi}-${di}-${si}`]?.note || ''; }
function autoStatus(id) { return S.autoSubs[id]?.status || 'none'; }
function autoNote(id) { return S.autoSubs[id]?.note || ''; }

function setStatus(wi,di,si,st) {
  const cur = gs(wi,di,si);
  const next = cur === st ? 'none' : st;
  S.subs[`${wi}-${di}-${si}`].status = next;
  save(); refresh();
  if (next === 'warn') {
    setTimeout(()=>{
      const el = document.getElementById(`nt-${wi}-${di}-${si}`);
      if (el) { el.style.display = 'block'; el.focus(); }
    }, 50);
  }
}
function upNote(wi,di,si,v) { S.subs[`${wi}-${di}-${si}`].note = v; save(); }

function setAutoStatus(id, st) {
  if (!S.autoSubs[id]) S.autoSubs[id] = { status:'none', note:'' };
  const cur = S.autoSubs[id].status;
  S.autoSubs[id].status = cur === st ? 'none' : st;
  save(); refresh();
  if (S.autoSubs[id].status === 'warn') {
    setTimeout(()=>{
      const el = document.getElementById(`ant-${id.replace(/[^a-zA-Z0-9]/g,'_')}`);
      if (el) { el.style.display = 'block'; el.focus(); }
    }, 50);
  }
}
function upAutoNote(id, v) {
  if (!S.autoSubs[id]) S.autoSubs[id] = { status:'none', note:'' };
  S.autoSubs[id].note = v; save();
}

// ===== FLATTEN DAYS FOR OFFSET CALCULATION =====
function flattenDays() {
  const flat = [];
  W.forEach((w, wi) => {
    w.days.forEach((d, di) => {
      flat.push({ wi, di, date: d.date, badge: d.badge });
    });
  });
  return flat;
}

function findDayAtOffset(fromWi, fromDi, offset) {
  const flat = flattenDays();
  const fromIdx = flat.findIndex(d => d.wi === fromWi && d.di === fromDi);
  if (fromIdx < 0) return null;
  const targetIdx = fromIdx + offset;
  if (targetIdx >= 0 && targetIdx < flat.length) return flat[targetIdx];
  return null;
}

// ===== AUTO-ADJUSTMENT ENGINE WITH SPACED REPETITION =====
function computeAutoTasks() {
  const autoTasks = {}; // key: 'wi-di' -> [autoTask, ...]

  W.forEach((w, wi) => {
    w.days.forEach((d, di) => {
      d.subs.forEach((sub, si) => {
        const st = gs(wi, di, si);
        if (st !== 'warn') return; // only warn tasks trigger review

        // Get review schedule for this tag
        const schedules = SPACED_SCHEDULE[sub.tags] || [];
        if (schedules.length === 0) return; // no review needed for this type

        schedules.forEach((offset, roundIdx) => {
          const round = roundIdx + 1;
          const target = findDayAtOffset(wi, di, offset);
          if (!target) return; // beyond plan range

          // Don't schedule review on the same day as a test (badge === 'test')
          // Test days should be light; push to next available day
          let tw = target.wi, td = target.di;
          if (W[tw].days[td].badge === 'test') {
            const next = findDayAtOffset(tw, td, 1);
            if (next) { tw = next.wi; td = next.di; }
          }

          const autoId = `${wi}-${di}-${si}-r${round}`;
          const key = `${tw}-${td}`;
          if (!autoTasks[key]) autoTasks[key] = [];

          // Check if this auto-task already exists in the target day
          if (!autoTasks[key].find(a => a.id === autoId)) {
            autoTasks[key].push({
              id: autoId,
              sourceSubject: sub.s,
              sourceContent: sub.c,
              sourceTags: sub.tags,
              sourceWi: wi, sourceDi: di, sourceSi: si,
              round,
              isCore: sub.t === 'core',
            });
          }
        });
      });
    });
  });

  return autoTasks;
}

// ===== PROGRESS =====
function weekProgress(wi) {
  let t=0, d=0, w=0, s=0;
  // Count original subtasks
  W[wi].days.forEach((day,di)=>{
    day.subs.forEach((_,si)=>{
      t++; const st=gs(wi,di,si);
      if (st==='done') d++; if (st==='warn') w++; if (st==='skip') s++;
    });
  });
  // Count auto tasks for this week
  const autoTasks = computeAutoTasks();
  Object.entries(autoTasks).forEach(([key, tasks]) => {
    const [tw, td] = key.split('-').map(Number);
    if (tw === wi) {
      tasks.forEach(at => { t++; if (autoStatus(at.id)==='done') d++; });
    }
  });
  return {t, d, w, s, pct: t ? Math.round(d/t*100) : 0};
}
function totalProgress() {
  let t=0, d=0, w=0, s=0;
  W.forEach((_,wi)=>{ const p=weekProgress(wi); t+=p.t; d+=p.d; w+=p.w; s+=p.s; });
  return {t, d, w, s, pct: t ? Math.round(d/t*100) : 0};
}

// ===== SUBJECT SUMMARY FOR ADJUSTMENT BANNER =====
function computeSummary() {
  const subWarn = { math:0, chinese:0, english:0 };
  const autoTasks = computeAutoTasks();
  let totalAuto = 0;
  Object.values(autoTasks).forEach(tasks => { totalAuto += tasks.length; });

  W.forEach((w,wi)=>{ w.days.forEach((d,di)=>{ d.subs.forEach((sub,si)=>{
    if (gs(wi,di,si)==='warn') subWarn[sub.s] = (subWarn[sub.s]||0)+1;
  });});});

  const summary = [];
  if (subWarn.math >= 4) summary.push({subj:'数学', msg:`${subWarn.math}项需回滚，建议放慢节奏，先保证正确率再追求速度`});
  if (subWarn.chinese >= 4) summary.push({subj:'语文', msg:`${subWarn.chinese}项需回滚，建议每日听写量减半`});
  if (subWarn.english >= 3) summary.push({subj:'英语', msg:`${subWarn.english}项需回滚，建议增加跟读减少拼写`});
  if (totalAuto > 0) summary.push({subj:'回滚', msg:`共 ${totalAuto} 项回滚任务已按记忆曲线自动排入后续日程`});

  const accel = [];
  ['math','chinese','english'].forEach(sb=>{
    let t=0, d=0;
    W.forEach((w,wi)=>{ w.days.forEach((day,di)=>{ day.subs.forEach((sub,si)=>{
      if (sub.s===sb) { t++; if (gs(wi,di,si)==='done') d++; }
    });});});
    if (t>0 && d/t > 0.8) accel.push(sb==='math'?'数学':sb==='chinese'?'语文':'英语');
  });
  if (accel.length>0) summary.push({subj:'加速', msg:`${accel.join('、')}完成率>80%，可以考虑提速`});

  return summary;
}

// ===== RENDER =====
let curTab = 'week-0';

function refresh() {
  const p = totalProgress();
  document.getElementById('totalPct').textContent = p.pct+'%';
  document.getElementById('progBar').style.width = p.pct+'%';
  document.getElementById('cntDone').textContent = p.d; document.getElementById('pillDone').style.display = p.d>0?'':'none';
  document.getElementById('cntWarn').textContent = p.w; document.getElementById('pillWarn').style.display = p.w>0?'':'none';
  document.getElementById('cntSkip').textContent = p.s; document.getElementById('pillSkip').style.display = p.s>0?'':'none';
  renderTabs();
  renderPanel(curTab);
}

function renderTabs() {
  let h = '';
  W.forEach((w,i)=>{
    const p = weekProgress(i);
    let dot = '';
    if (p.w > 0) dot = '<span class="dot red"></span>';
    else if (p.pct >= 80) dot = '<span class="dot" style="background:var(--green)"></span>';
    h += `<div class="tab${curTab==='week-'+i?' active':''}" onclick="switchTab('week-${i}')">${dot}W${i+1} ${p.pct}%</div>`;
  });
  const errTotal = (S.errors.math||[]).filter(e=>!e.resolved).length + (S.errors.chinese||[]).filter(e=>!e.resolved).length + (S.errors.english||[]).filter(e=>!e.resolved).length;
  h += `<div class="tab${curTab==='errors'?' active':''}" onclick="switchTab('errors')">📋 错题${errTotal>0?' ('+errTotal+')':''}</div>`;
  h += `<div class="tab${curTab==='assess'?' active':''}" onclick="switchTab('assess')">📊 评估</div>`;
  document.getElementById('tabBar').innerHTML = h;
}

function switchTab(t) { curTab=t; refresh(); }

function renderPanel(tab) {
  const c = document.getElementById('content');
  if (tab==='errors') { c.innerHTML = renderErrors(); return; }
  if (tab==='assess') { c.innerHTML = renderAssess(); return; }
  c.innerHTML = renderWeek(parseInt(tab.split('-')[1]));
}

function renderWeek(wi) {
  const autoTasks = computeAutoTasks();
  const summary = computeSummary();
  const p = weekProgress(wi);
  let h = '';

  // Legend
  h += `<div class="legend"><span><span class="subj-tag subj-math">数学</span> 蓝色</span> <span><span class="subj-tag subj-chinese">语文</span> 粉色</span> <span><span class="subj-tag subj-english">英语</span> 绿色</span> <span>|</span> <span style="color:var(--purple);font-weight:600;">■ 紫色边框 = 自动回滚任务</span></div>`;

  // Adjustment banner
  if (summary.length > 0) {
    h += `<div class="alert-banner show"><strong>🔧 智能分析</strong>`;
    summary.forEach(s => { h += `<div class="alert-item">· <strong>${s.subj}：</strong>${s.msg}</div>`; });
    h += `</div>`;
  }

  // Week progress
  const weekAutoTasks = Object.entries(autoTasks).filter(([key]) => {
    const [tw] = key.split('-').map(Number); return tw === wi;
  });
  const autoCount = weekAutoTasks.reduce((sum, [,tasks]) => sum + tasks.length, 0);
  h += `<div style="font-size:.8rem;color:var(--text2);margin-bottom:12px;">原始任务：${p.d}/${p.t-p.w-p.s}完成（${p.pct}%）| 回滚：${p.w} | 跳过：${p.s}${autoCount>0?' | 自动回滚任务：'+autoCount+'项':''}</div>`;

  W[wi].days.forEach((day, di) => {
    const isToday = isCurrentDay(wi, di);
    const dayTime = day.subs.reduce((sum, sub) => sum + (sub.time||0), 0);
    const key = `${wi}-${di}`;
    const dayAutoTasks = autoTasks[key] || [];

    h += `<div class="day-card${isToday?' today':''}">`;
    h += `<div class="day-header"><h3>${day.date}${isToday?' 👈 今天':''}</h3>`;
    h += `<span class="day-time">${day.badge==='review'?'复习日':day.badge==='test'?'检测日':''} 预估 ${dayTime} 分钟</span>`;
    if (day.badge) h += `<span style="margin-left:4px;" class="badge ${day.badge==='review'?'review':'test'}">${day.badge==='review'?'复习日':'检测日'}</span>`;
    h += `</div>`;

    // Count day stats
    let dt=0, dd=0;
    day.subs.forEach((_,si)=>{ dt++; if(gs(wi,di,si)==='done') dd++; });
    if (dt>0) h += `<div class="day-stats">${dd}/${dt} 项完成</div>`;

    // Original subtasks
    day.subs.forEach((sub, si) => {
      h += renderSubtask(wi, di, si, sub);
    });

    // Auto-generated review tasks for this day
    dayAutoTasks.forEach(at => {
      h += renderAutoTask(at);
    });

    h += `</div>`;
  });

  h += `<div class="actions"><button class="btn btn-outline btn-sm" onclick="if(confirm('确定重置第${wi+1}周所有状态？原始+自动回滚任务都会被清除。')){resetWeek(${wi});}">重置本周</button></div>`;
  return h;
}

function renderSubtask(wi, di, si, sub) {
  const st = gs(wi,di,si);
  const note = gn(wi,di,si);
  const subjCls = sub.s === 'math' ? 'subj-math' : sub.s === 'chinese' ? 'subj-chinese' : 'subj-english';

  let h = `<div class="sub-row">`;
  h += `<span class="subj-tag ${subjCls}">${sub.d}</span>`;
  h += `<span class="time-badge">${sub.time}min</span>`;
  h += `<span class="sub-content${sub.t==='core'?' core':''}">${sub.c}</span>`;
  if (sub.t === 'core') h += `<span class="core-dot">重点</span>`;
  h += `<span class="status-btns">`;
  h += `<button class="sbtn${st==='done'?' on-done':''}" onclick="setStatus(${wi},${di},${si},'done')">✓ 完成</button>`;
  h += `<button class="sbtn${st==='warn'?' on-warn':''}" onclick="setStatus(${wi},${di},${si},'warn')">! 回滚</button>`;
  h += `<button class="sbtn${st==='skip'?' on-skip':''}" onclick="setStatus(${wi},${di},${si},'skip')">— 跳过</button>`;
  h += `</span></div>`;
  h += `<input class="sub-notes" id="nt-${wi}-${di}-${si}" placeholder="💬 备注（错在哪/为什么跳过）" value="${esc(note)}" onchange="upNote(${wi},${di},${si},this.value)" style="display:${note||st==='warn'?'block':'none'};margin-left:80px;width:calc(100%-84px);">`;
  return h;
}

function renderAutoTask(at) {
  const st = autoStatus(at.id);
  const note = autoNote(at.id);
  const subjCls = at.sourceSubject === 'math' ? 'subj-math' : at.sourceSubject === 'chinese' ? 'subj-chinese' : 'subj-english';
  const label = at.sourceSubject === 'math' ? '数学' : at.sourceSubject === 'chinese' ? '语文' : '英语';
  const noteId = `ant-${at.id.replace(/[^a-zA-Z0-9]/g,'_')}`;

  // Shorter content for display
  const shortContent = at.sourceContent.length > 55 ? at.sourceContent.substring(0, 55) + '...' : at.sourceContent;

  let h = `<div class="sub-row auto-row">`;
  h += `<span class="auto-badge">${ROUND_LABEL[at.round]||'回滚'}</span>`;
  h += `<span class="subj-tag ${subjCls}">${label}</span>`;
  h += `<span class="time-badge">~5m</span>`;
  h += `<span class="sub-content">${esc(shortContent)}</span>`;
  h += `<span class="review-round">(源自${W[at.sourceWi].days[at.sourceDi].date})</span>`;
  h += `<span class="status-btns">`;
  h += `<button class="sbtn${st==='done'?' on-done':''}" onclick="setAutoStatus('${at.id}','done')">✓ 完成</button>`;
  h += `<button class="sbtn${st==='warn'?' on-warn':''}" onclick="setAutoStatus('${at.id}','warn')">! 回滚</button>`;
  h += `<button class="sbtn${st==='skip'?' on-skip':''}" onclick="setAutoStatus('${at.id}','skip')">— 跳过</button>`;
  h += `</span></div>`;
  h += `<input class="sub-notes" id="${noteId}" placeholder="💬 回滚结果记录（如：这次对了/还是错了哪几个）" value="${esc(note)}" onchange="upAutoNote('${at.id}',this.value)" style="display:${note||st==='warn'?'block':'none'};margin-left:90px;width:calc(100%-94px);">`;
  return h;
}

function isCurrentDay(wi, di) {
  const now = new Date();
  const dayMap = {
    '0-0':'2026-06-02','0-1':'2026-06-03','0-2':'2026-06-04','0-3':'2026-06-05','0-4':'2026-06-06','0-5':'2026-06-07',
    '1-0':'2026-06-08','1-1':'2026-06-09','1-2':'2026-06-10','1-3':'2026-06-11','1-4':'2026-06-12','1-5':'2026-06-13',
    '2-0':'2026-06-15','2-1':'2026-06-16','2-2':'2026-06-17','2-3':'2026-06-18','2-4':'2026-06-19','2-5':'2026-06-20',
    '3-0':'2026-06-22','3-1':'2026-06-23','3-2':'2026-06-24','3-3':'2026-06-25','3-4':'2026-06-26','3-5':'2026-06-27',
  };
  const key = `${wi}-${di}`;
  if (dayMap[key]) {
    const d = new Date(dayMap[key] + 'T00:00:00');
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    return d.getTime() === today.getTime();
  }
  return false;
}

  const subs = [
    {k:'math',l:'数学错题',h:'mh'},

  const warnItems = [];

  });});});

  }

      h += `<td><input value="${esc(e.desc||'')}" onchange="upErr('${sb.k}',${idx},'desc',this.value)" placeholder="具体怎么错的"></td>`;
      h += `<td><input value="${esc(e.errorType||'')}" onchange="upErr('${sb.k}',${idx},'errorType',this.value)" placeholder="概念/粗心"></td>`;
      h += `<td style="white-space:nowrap">`;
      h += `<button class="btn btn-sm" style="margin-right:3px;background:${e.resolved?'#e2e8f0':'var(--green)'};color:#fff;" onclick="toggleErr('${sb.k}',${idx})">${e.resolved?'撤销':'解决'}</button>`;
      h += `<button class="btn btn-sm btn-outline" onclick="delErr('${sb.k}',${idx})">删</button>`;
      h += `</td></tr>`;
    });
    h += `</table>`;
    h += `<button class="btn btn-blue btn-sm" style="margin-top:6px" onclick="addErr('${sb.k}')">+ 添加</button>`;
    h += `</div>`;
  });
  return h;
}

function addErr(k) { S.errors[k].push({date:'',content:'',desc:'',errorType:'',resolved:false}); save(); refresh(); }
function toggleErr(k,i) { S.errors[k][i].resolved = !S.errors[k][i].resolved; save(); refresh(); }
function delErr(k,i) { S.errors[k].splice(i,1); save(); refresh(); }
function upErr(k,i,f,v) { if (S.errors[k][i]) { S.errors[k][i][f]=v; save(); }}

// ===== ASSESSMENT =====

  W.forEach((w,wi)=>{

    h += `<label>本周实际完成率（%）</label><input value="${esc(a.completion||'')}" onchange="upAssess(${wi},'completion',this.value)" placeholder="如：85">`;
    h += `<label>学得最顺的科目/内容（可加速）</label><input value="${esc(a.strength||'')}" onchange="upAssess(${wi},'strength',this.value)" placeholder="如：英语单词掌握快">`;
    h += `<label>问题最多的科目/内容（需加强）</label><input value="${esc(a.weakness||'')}" onchange="upAssess(${wi},'weakness',this.value)" placeholder="如：数学面积单位换算反复错">`;
    h += `<label>未完成/需继续补的内容</label><textarea onchange="upAssess(${wi},'rollback',this.value)">${esc(a.rollback||'')}</textarea>`;
    h += `<label>下周计划怎么调整？</label><textarea onchange="upAssess(${wi},'adjust',this.value)">${esc(a.adjust||'')}</textarea>`;
    h += `</div>`;
  });
  h += `<div class="actions"><button class="btn btn-outline btn-sm" onclick="if(confirm('清除所有评估记录？')){S.assess={};save();refresh();}">清除评估记录</button></div>`;
  return h;
}
function upAssess(wi,f,v) { if(!S.assess[wi]) S.assess[wi]={}; S.assess[wi][f]=v; save(); }

// ===== BACKUP / RESTORE =====
function exportData() {
  const data = {
    version: 5,
    exportedAt: new Date().toISOString(),
    subs: S.subs,
    autoSubs: S.autoSubs,
    errors: S.errors,
    assess: S.assess,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `三年级复习备份-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('备份已下载！请保存好这个文件');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.subs) throw new Error('无效的备份文件');
      // Merge with current state
      for (const k of Object.keys(data.subs)) {
        if (S.subs[k] !== undefined) S.subs[k] = data.subs[k];
      }
      if (data.autoSubs) S.autoSubs = data.autoSubs;
      if (data.errors) S.errors = data.errors;
      if (data.assess) S.assess = data.assess;
      save();
      refresh();
      toast('备份已导入！数据已恢复');
    } catch(err) {
      toast('导入失败：文件格式不正确');
    }
  };
  reader.readAsText(file);
  event.target.value = ''; // Reset file input
}

function clearAll() {
  S = defaultState();
  save();
  refresh();
  toast('所有数据已清除');
}

// ===== CLOUD SYNC (JSONBin.io) =====
const CL_CONFIG = 'cloud_config';

function getCloudConfig() {
  try { return JSON.parse(localStorage.getItem(CL_CONFIG)) || {}; } catch(e) { return {}; }
}
function setCloudConfig(c) { localStorage.setItem(CL_CONFIG, JSON.stringify(c)); }

function toggleCloudPanel() {
  const p = document.getElementById('cloudPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  const cfg = getCloudConfig();
  if (cfg.key) document.getElementById('jsonbinKey').value = cfg.key;
  if (cfg.id) document.getElementById('jsonbinId').value = cfg.id;
}
function saveCloudConfig() {
  const key = document.getElementById('jsonbinKey').value.trim();
  const id = document.getElementById('jsonbinId').value.trim();
  if (!key || !id) { toast('请填写 API Key 和 Bin ID'); return; }
  setCloudConfig({key, id});
  toast('云端配置已保存');
}

function buildPayload() {
  return {
    version: 5,
    updatedAt: new Date().toISOString(),
    subs: S.subs,
    autoSubs: S.autoSubs,
    errors: S.errors,
    assess: S.assess,
  };
}

async function syncToCloud() {
  const cfg = getCloudConfig();
  if (!cfg.key || !cfg.id) { toggleCloudPanel(); toast('请先配置云端存储'); return; }
  const st = document.getElementById('cloudStatus');
  st.textContent = '上传中...';
  try {
    const payload = buildPayload();
    const resp = await fetch(`https://api.jsonbin.io/v3/b/${cfg.id}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': cfg.key,
        'X-Bin-Versioning': 'false',
      },
      body: JSON.stringify(payload),
    });
    if (resp.ok) {
      st.textContent = `✓ 已同步 ${new Date().toLocaleTimeString()}`;
      toast('云端同步成功！其他设备可加载');
    } else {
      const err = await resp.json().catch(()=>({}));
      st.textContent = '上传失败';
      toast('同步失败: ' + (err.message || resp.status));
    }
  } catch(e) {
    st.textContent = '网络错误';
    toast('网络连接失败，请重试');
  }
}

async function syncFromCloud() {
  const cfg = getCloudConfig();
  if (!cfg.key || !cfg.id) { toggleCloudPanel(); toast('请先配置云端存储'); return; }
  const st = document.getElementById('cloudStatus');
  st.textContent = '下载中...';
  try {
    const resp = await fetch(`https://api.jsonbin.io/v3/b/${cfg.id}/latest`, {
      headers: { 'X-Master-Key': cfg.key },
    });
    if (resp.ok) {
      const result = await resp.json();
      const data = result.record;
      if (!data.subs) { toast('云端数据格式无效'); return; }
      for (const k of Object.keys(data.subs)) {
        if (S.subs[k] !== undefined) S.subs[k] = data.subs[k];
      }
      if (data.autoSubs) S.autoSubs = data.autoSubs;
      if (data.errors) S.errors = data.errors;
      if (data.assess) S.assess = data.assess;
      save();
      refresh();
      st.textContent = `✓ 已加载 ${new Date().toLocaleTimeString()}`;
      toast('云端数据已加载！');
    } else {
      st.textContent = '下载失败';
      toast('加载失败，请检查配置');
    }
  } catch(e) {
    st.textContent = '网络错误';
    toast('网络连接失败，请重试');
  }
}

// ===== UTILS =====
function updateLastSave() {
  const el = document.getElementById('lastSave');
  if (el) {
    const now = new Date();
    el.textContent = `上次保存：${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
  }
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }
function resetWeek(wi) {
  W[wi].days.forEach((d,di)=>{
    d.subs.forEach((_,si)=>{ S.subs[`${wi}-${di}-${si}`] = {status:'none',note:''}; });
  });
  // Also clear auto tasks targeting this week
  const autoTasks = computeAutoTasks();
  Object.entries(autoTasks).forEach(([key, tasks]) => {
    const [tw] = key.split('-').map(Number);
    if (tw === wi) {
      tasks.forEach(at => { delete S.autoSubs[at.id]; });
    }
  });
  save(); refresh(); toast(`第${wi+1}周已重置`);
}

// ===== INIT =====
refresh();

// Auto-scroll to today
setTimeout(()=>{
  const now = new Date();
  for (let wi=0; wi<W.length; wi++) {
    for (let di=0; di<W[wi].days.length; di++) {
      if (isCurrentDay(wi, di)) {
        curTab = 'week-' + wi;
        refresh();
        setTimeout(()=>{
          const cards = document.querySelectorAll('.day-card.today');
          if (cards.length>0) cards[0].scrollIntoView({behavior:'smooth',block:'start'});
        }, 200);
        return;
      }
    }
  }
}, 100);
